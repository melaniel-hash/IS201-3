<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Explorer</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #000014;
        color: white;
        text-align: center;
        padding: 40px;
        overflow-x: hidden;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 10px;
        color: #9bb8ff;
        text-shadow: 0 0 15px #4d6bff;
        position: relative;
        z-index: 10;
    }

    p.subtitle {
        color: #c7d4ff;
        margin-bottom: 40px;
        font-size: 20px;
    }


/* REALISTIC ASTEROID BELT */
.asteroid-belt {
    position: relative;
    width: 420px;
    height: 420px;
    margin: 0 auto 40px auto;
    border-radius: 50%;
    animation: spin 28s linear infinite;
}

.asteroid-belt.inner {
    width: 300px;
    height: 300px;
    animation-duration: 18s;
    opacity: 0.85;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Asteroid base style */
.asteroid {
    position: absolute;
    background: #7d7d7d;
    border-radius: 50%;
    box-shadow: 0 0 8px #aaa;
    animation: wobble 3s ease-in-out infinite alternate;
}

@keyframes wobble {
    from { transform: scale(1) translateY(0px); }
    to { transform: scale(1.15) translateY(3px); }
}

/* Random asteroid sizes */
.small  { width: 10px; height: 10px; }
.med    { width: 16px; height: 16px; }
.large  { width: 22px; height: 22px; }

/* Random positions around the ring */
.a1 { top: 0%; left: 50%; transform: translateX(-50%); }
.a2 { top: 10%; left: 80%; }
.a3 { top: 25%; left: 95%; }
.a4 { top: 50%; left: 100%; transform: translateY(-50%); }
.a5 { top: 75%; left: 92%; }
.a6 { top: 90%; left: 70%; }
.a7 { top: 100%; left: 50%; transform: translateX(-50%); }
.a8 { top: 85%; left: 20%; }
.a9 { top: 60%; left: 5%; }
.a10 { top: 30%; left: 0%; }

.a11 { top: 5%; left: 30%; }
.a12 { top: 20%; left: 10%; }
.a13 { top: 40%; left: 15%; }
.a14 { top: 70%; left: 30%; }
.a15 { top: 85%; left: 50%; }
.a16 { top: 70%; left: 75%; }
.a17 { top: 40%; left: 85%; }
.a18 { top: 15%; left: 65%; }
.a19 { top: 50%; left: 30%; }
.a20 { top: 60%; left: 60%; }


    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 30px;
        max-width: 1100px;
        margin: auto;
    }

    .planet-card {
        position: relative;
        perspective: 1000px;
    }

    .planet-card input {
        display: none;
    }

    .card {
        width: 100%;
        height: 230px;
        border-radius: 15px;
        background: #111;
        box-shadow: 0 0 20px rgba(255,255,255,0.25);
        cursor: pointer;
        transition: transform 0.7s;
        transform-style: preserve-3d;
        position: relative;
    }

    .card:hover {
        box-shadow: 0 0 25px #7aa2ff;
        transform: scale(1.03);
    }

    .planet-card input:checked + .card {
        transform: rotateY(180deg);
    }

    .front, .back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
        text-align: center;
    }

    .front {
        font-size: 28px;
        font-weight: bold;
        color: #fff;
        background-size: cover;
        background-position: center;
        text-shadow: 0 0 10px black;
    }

    .back {
        background: rgba(255,255,255,0.1);
        transform: rotateY(180deg);
        font-size: 18px;
        color: #e0e6ff;
        padding: 20px;
    }

    /* Planet images */
    .mercury { background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg'); }
    .venus   { background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg'); }
    .earth   { background-image: url('https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg'); }
    .mars    { background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg'); }
    .jupiter { background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg'); }
    .saturn  { background-image: url('https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg'); }
    .uranus  { background-image: url('https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg'); }
    .neptune { background-image: url('https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg'); }

    details {
        margin-top: 50px;
        background: rgba(255,255,255,0.1);
        padding: 20px;
        border-radius: 10px;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
        cursor: pointer;
    }

    summary {
        font-size: 22px;
        font-weight: bold;
        color: #9bb8ff;
        text-shadow: 0 0 10px #4d6bff;
    }

</style>
</head>

<body>

<h1>🌌 Space Explorer</h1>
<p class="subtitle">Click a planet to flip it for a fun fact!</p>

<!-- OUTER ASTEROID BELT -->
<div class="asteroid-belt">
    <div class="asteroid small a1"></div>
    <div class="asteroid med a2"></div>
    <div class="asteroid large a3"></div>
    <div class="asteroid med a4"></div>
    <div class="asteroid small a5"></div>
    <div class="asteroid med a6"></div>
    <div class="asteroid large a7"></div>
    <div class="asteroid small a8"></div>
    <div class="asteroid med a9"></div>
    <div class="asteroid large a10"></div>
</div>

<!-- INNER ASTEROID BELT -->
<div class="asteroid-belt inner">
    <div class="asteroid small a11"></div>
    <div class="asteroid med a12"></div>
    <div class="asteroid large a13"></div>
    <div class="asteroid med a14"></div>
    <div class="asteroid small a15"></div>
    <div class="asteroid med a16"></div>
    <div class="asteroid large a17"></div>
    <div class="asteroid small a18"></div>
    <div class="asteroid med a19"></div>
    <div class="asteroid large a20"></div>
</div>


<div class="grid">

    <!-- Mercury -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front mercury">Mercury</div>
            <div class="back">Mercury is the fastest planet, orbiting the Sun in just 88 days.</div>
        </div>
    </label>

    <!-- Venus -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front venus">Venus</div>
            <div class="back">Venus rotates backwards — the Sun rises in the west.</div>
        </div>
    </label>

    <!-- Earth -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front earth">Earth</div>
            <div class="back">Earth is the only known planet with life and liquid oceans.</div>
        </div>
    </label>

    <!-- Mars -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front mars">Mars</div>
            <div class="back">Mars has the tallest volcano in the solar system: Olympus Mons.</div>
        </div>
    </label>

    <!-- Jupiter -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front jupiter">Jupiter</div>
            <div class="back">Jupiter’s Great Red Spot is a storm larger than Earth.</div>
        </div>
    </label>

    <!-- Saturn -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front saturn">Saturn</div>
            <div class="back">Saturn’s rings are made of ice, dust, and rock chunks.</div>
        </div>
    </label>

    <!-- Uranus -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front uranus">Uranus</div>
            <div class="back">Uranus rotates on its side — its tilt is 98 degrees.</div>
        </div>
    </label>

    <!-- Neptune -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front neptune">Neptune</div>
            <div class="back">Neptune has the fastest winds in the solar system.</div>
        </div>
    </label>

</div>

<details>
    <summary>🌠 Expand to Learn About the Milky Way</summary>
    <p>The Milky Way is a barred spiral galaxy containing over 100 billion stars. Our solar system is located in the Orion Arm, far from the galactic center.</p>
</details>

</body>
</html>
